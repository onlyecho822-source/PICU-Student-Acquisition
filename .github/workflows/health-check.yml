name: Repository Health Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Check repository health
        run: |
          echo "## Repository Health Check — $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for f in README.md LICENSE .gitignore; do
            if [ -f "$f" ]; then
              echo "✓ $f present" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠ $f missing" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ -f package.json ]; then
            echo "✓ package.json found" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f pnpm-lock.yaml ]; then
            echo "✓ pnpm lockfile found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f index.html ]; then
            count=$(grep -c 'YOUR_' index.html 2>/dev/null || echo 0)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Unfilled placeholders: $count" >> $GITHUB_STEP_SUMMARY
            if [ "$count" -eq "0" ]; then
              echo "✅ Site ready to deploy" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠ $count placeholder(s) remain" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Health check complete." >> $GITHUB_STEP_SUMMARY
